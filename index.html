<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para Professores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Formulário para Professores -->
        <div id="form-section">
            <h1>Envie suas informações</h1>
            <form id="teacherForm">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome" required>
                </div>
                <div class="form-group">
                    <label for="subject">Matéria</label>
                    <input type="text" id="subject" name="subject" placeholder="Digite a matéria" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" name="message" placeholder="Digite sua mensagem" rows="4" required></textarea>
                </div>
                <button type="button" onclick="submitForm()">Enviar</button>
                <p id="formSuccess" class="success-message" style="display: none;">Formulário enviado com sucesso!</p>
            </form>
            <button id="admin-access" onclick="showLogin()">Acessar como Administrador</button>
        </div>

        <!-- Login para Administradores -->
        <div id="login-section" class="hidden">
            <h1>Login do Administrador</h1>
            <form>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <button type="button" onclick="adminLogin()">Entrar</button>
                <p id="loginError" class="error-message" style="display: none;">Credenciais inválidas!</p>
            </form>
        </div>

        <!-- Painel de Administrador -->
        <div id="admin-section" class="hidden">
            <h1>Respostas dos Professores</h1>
            <ul id="responses"></ul>
            <button onclick="logout()">Sair</button>
        </div>
    </div>
    <script src="js.js"></script>
</body>
</html>
